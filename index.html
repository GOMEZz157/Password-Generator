<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Link to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
      rel="stylesheet"
    />
    <!-- Link to CSS -->
    <link rel="stylesheet" href="css/styles.css" />
    <!-- Link to JS -->
    <script src="js/scripts.js" defer></script>
  </head>
  <body>
    <div id="register-container">
      <div id="register-banner">
        <div id="banner-layer">
          <h1>Seja Bem-vindo!</h1>
        </div>
      </div>
      <div id="register-form">
        <h2>Crie sua conta</h2>
        <p>Registre-se para utilizar todas as funcionalidades do sistema.</p>
        <div id="form-control">
          <label for="name">Nome</label>
          <input
            type="text"
            name="name"
            id="name"
            placeholder="Digite seu nome"
          />

          <label for="email">Email</label>
          <input
            type="text"
            name="email"
            id="email"
            placeholder="Digite seu email"
          />
          <label for="password">Senha</label>
          <input
            type="text"
            type="password"
            id="password"
            placeholder="Digite sua senha"
          />
          <p>
            Quer ajuda para criar uma senha segura?
            <span id="generate-password">Clique aqui.</span>
          </p>
          <div id="generated-password">
            <p>Aqui está sua senha:</p>
            <h4></h4>
          </div>
          <label for="confirmpassword">Confirmação de senha</label>
          <input
            type="text"
            type="confirmpassword"
            id="confirmpassword"
            placeholder="Confirme sua senha"
          />
        </div>
        <input type="submit" value="Cadastrar" />
      </div>
    </div>
  </body>
</html>
